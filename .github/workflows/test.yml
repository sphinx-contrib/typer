name: Test

permissions:
  contents: read

on:
  push:
    tags-ignore:
      - '*'
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_call:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Open ssh debug session.'
        required: true
        default: false
        type: boolean
  schedule:
    # Every Sunday at 9:00 AM Los Angeles time.
    # GitHub cron is UTC; 09:00 PT == 17:00 UTC (PST).
    - cron: '0 17 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        sphinx-version: ['6', '7', '8', '9']
        exclude:
          - python-version: '3.12'
            sphinx-version: '6'
          - python-version: '3.13'
            sphinx-version: '6'
          - python-version: '3.14'
            sphinx-version: '6'
          - python-version: '3.12'
            sphinx-version: '7'
          - python-version: '3.13'
            sphinx-version: '7'
          - python-version: '3.11'
            sphinx-version: '9'
          - python-version: '3.14'
            sphinx-version: '7'
          - python-version: '3.10'
            sphinx-version: '9'
    env:
      COVERAGE_FILE: py${{ matrix.python-version }}-sphinx${{ matrix.sphinx-version }}.coverage

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: false
    - name: Upgrade all dependencies for our weekly runs
      if: github.event_name == 'schedule'
      run: uv lock --upgrade
    - name: Install Just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
    - name: Install Emacs
      if: ${{ github.event.inputs.debug == 'true' }}
      run: |
        sudo apt install emacs
    - name: Setup tmate session
      if: ${{ github.event.inputs.debug == 'true' }}
      uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113
      with:
        detached: true
      timeout-minutes: 60
    - name: Install System Dependencies
      run: |
        sudo apt-get install libopenblas-dev libxml2-dev libxslt1-dev zlib1g-dev
    - name: Run Unit Tests
      run: |
        just test-sphinx ${{ matrix.sphinx-version }}
    - name: Store coverage files
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ env.COVERAGE_FILE }}
        path: ${{ env.COVERAGE_FILE }}

  coverage-combine:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Install Dependencies
        run: |
          just setup
      - name: Get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: "*.coverage"
          merge-multiple: true
      - run: ls -la *.coverage
      - run: just coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          use_oidc: true
          files: ./coverage.xml
          verbose: true
